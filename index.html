<!-- ВАШ КОД С ДОБАВЛЕНИЕМ 3D-МОДЕЛИ (БЕЗ РЕФАКТОРИНГА) -->
<script>
    // --- 3D МОДЕЛЬ (НОВЫЙ БЛОК) ---
    function init3DObject() {
        const container = document.getElementById('om-container');
        if (!container) return;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x8b0000, 1.5, 100);
        pointLight.position.set(0, 3, 4);
        scene.add(pointLight);

        let model;
        const loader = new THREE.OBJLoader();
        loader.load('om.obj', function (object) {
            const material = new THREE.MeshStandardMaterial({
                color: 0x222222, metalness: 0.8, roughness: 0.4,
                emissive: 0x8b0000, emissiveIntensity: 0.4
            });
            object.traverse(child => { if (child.isMesh) child.material = material; });
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            object.position.sub(center);
            object.scale.set(3, 3, 3);
            model = object;
            scene.add(model);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (model) {
                model.rotation.y += 0.005;
                model.rotation.x += 0.001;
            }
            renderer.render(scene, camera);
        }
        animate();
    }
    init3DObject(); // Запускаем 3D

    // --- ВАШ ОРИГИНАЛЬНЫЙ КОД (НАЧАЛО) ---
    let audioCtx, osc, gainNode, distortionNode;
    const enderAudio = document.getElementById('ender-audio');
    let isInitiated = false;

    const MAX_AMBIENT_VOL = 0.4;
    const MAX_DRONE_VOL = 0.05;

    async function initExperience() {
        document.getElementById('init-screen').style.display = 'none';
        isInitiated = true;

        enderAudio.volume = 0;
        enderAudio.play().catch(e => console.error("Ошибка аудио:", e));

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        distortionNode = audioCtx.createWaveShaper();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(55, audioCtx.currentTime);

        distortionNode.curve = makeDistortionCurve(0);
        distortionNode.oversample = '4x';
        gainNode.gain.setValueAtTime(MAX_DRONE_VOL, audioCtx.currentTime);

        osc.connect(distortionNode);
        distortionNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();

        updateAudioVolumes();
    }

    function updateAudioVolumes() {
        if (!isInitiated) return;

        if (document.getElementById('terminal').style.display === 'flex') {
            enderAudio.volume = MAX_AMBIENT_VOL;
            if (gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            return;
        }

        let scrollTop = window.scrollY || document.documentElement.scrollTop;
        let docHeight = Math.max(
            document.body.scrollHeight, document.documentElement.scrollHeight,
            document.body.offsetHeight, document.documentElement.offsetHeight,
            document.body.clientHeight, document.documentElement.clientHeight
        ) - window.innerHeight;

        let scrollPercent = 0;
        if (docHeight > 0) {
            scrollPercent = scrollTop / docHeight;
        }
        scrollPercent = Math.max(0, Math.min(1, scrollPercent));

        enderAudio.volume = scrollPercent * MAX_AMBIENT_VOL;

        if (gainNode) {
            let currentDroneVol = MAX_DRONE_VOL * (1 - scrollPercent);
            currentDroneVol = Math.max(0.002, currentDroneVol);
            gainNode.gain.setTargetAtTime(currentDroneVol, audioCtx.currentTime, 0.1);
        }
    }

    window.addEventListener('scroll', updateAudioVolumes);

    function makeDistortionCurve(amount) {
        let k = typeof amount === 'number' ? amount : 50, n_samples = 44100, curve = new Float32Array(n_samples);
        for (let i = 0; i < n_samples; ++i) {
            let x = i * 2 / n_samples - 1;
            curve[i] = (3 + k) * x * 20 * (Math.PI / 180) / (Math.PI + k * Math.abs(x));
        }
        return curve;
    }

    const glitchChars = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ!@#$%^&*()';
    document.addEventListener('mousemove', (e) => {
        if (audioCtx && distortionNode && gainNode.gain.value > 0.01) {
            let speed = Math.abs(e.movementX) + Math.abs(e.movementY);
            distortionNode.curve = makeDistortionCurve(Math.min(speed * 2, 400));
        }
        if (Math.random() > 0.5) {
            let drop = document.createElement('div');
            drop.classList.add('trail-drop');
            drop.innerText = glitchChars[Math.floor(Math.random() * glitchChars.length)];
            drop.style.left = e.clientX + (Math.random() * 20 - 10) + 'px';
            drop.style.top = e.clientY + (Math.random() * 20 - 10) + 'px';
            document.body.appendChild(drop);
            setTimeout(() => drop.remove(), 1500);
        }
    });

    const filterNoise = document.getElementById('noise-anim');
    let phase = 0;
    function animateFlesh() { phase += 0.05; filterNoise.setAttribute('baseFrequency', `0.01 ${0.1 + Math.sin(phase) * 0.05}`); requestAnimationFrame(animateFlesh); }
    animateFlesh();

    const textElement = document.getElementById('scramble-text');
    const originalText = textElement.innerText;
    function glitchText() {
        if (Math.random() > 0.9) {
            let currentText = originalText.split('');
            let breaks = Math.floor(Math.random() * 4) + 2;
            for (let i = 0; i < breaks; i++) {
                let idx = Math.floor(Math.random() * currentText.length);
                if (currentText[idx] !== ' ') currentText[idx] = glitchChars[Math.floor(Math.random() * glitchChars.length)];
            }
            textElement.innerText = currentText.join('');
        } else textElement.innerText = originalText;
        setTimeout(glitchText, Math.random() * 200 + 50);
    }
    glitchText();

    const rosterItems = document.querySelectorAll('.roster-item');
    const dynamicBg = document.getElementById('dynamic-bg');
    let hoverAudio = new Audio();

    rosterItems.forEach(item => {
        item.addEventListener('mouseenter', () => {
            const bgPath = item.getAttribute('data-bg'); if (bgPath) { dynamicBg.style.backgroundImage = `url(${bgPath})`; dynamicBg.style.opacity = 1; }
            const audioPath = item.getAttribute('data-audio'); if (audioPath) { hoverAudio.src = audioPath; hoverAudio.volume = 0.5; hoverAudio.play().catch(e => { }); }
            document.body.style.filter = "invert(1) hue-rotate(180deg)";
        });
        item.addEventListener('mouseleave', () => {
            dynamicBg.style.opacity = 0; hoverAudio.pause(); hoverAudio.currentTime = 0; document.body.style.filter = "none";
        });
    });

    const terminal = document.getElementById('terminal');
    const termInput = document.getElementById('term-input');
    const termError = document.getElementById('term-error');

    function openTerminal() {
        terminal.style.display = 'flex';
        setTimeout(() => termInput.focus(), 100);
        updateAudioVolumes();
    }

    function closeTerminal() {
        terminal.style.display = 'none';
        termInput.value = '';
        termError.style.opacity = 0;
        updateAudioVolumes();
    }

    termInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const password = termInput.value.toUpperCase().trim();
            if (password === 'СИМБИОЗ' || password === 'ENTER') {
                termInput.style.color = "#00ff00"; termInput.value = "ДОСТУП РАЗРЕШЕН...";
                setTimeout(() => { window.location.href = "https://t.me/your_secret_channel"; }, 1500);
            } else {
                termError.style.opacity = 1; document.body.style.transform = "translate(10px, -10px)";
                setTimeout(() => document.body.style.transform = "none", 100);
                termInput.value = '';
            }
        }
    });

    // Делаем функции глобальными, чтобы HTML их видел
    window.initExperience = initExperience;
    window.openTerminal = openTerminal;
    window.closeTerminal
