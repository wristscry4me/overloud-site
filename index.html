    <script>
        let audioCtx, osc, gainNode, distortionNode;
        const enderAudio = document.getElementById('ender-audio');
        let isInitiated = false;

        // --- УПРАВЛЕНИЕ ГРОМКОСТЬЮ (ПЛАВНЫЕ ФЕЙДЫ) ---
        let enderFadeInterval;
        function fadeEnderAudio(targetVolume, duration) {
            clearInterval(enderFadeInterval);
            
            // Защита от деления на ноль, если громкость уже нужная
            if (Math.abs(targetVolume - enderAudio.volume) < 0.01) return;

            let step = 0.05;
            let intervalTime = duration / (Math.abs(targetVolume - enderAudio.volume) / step);

            enderFadeInterval = setInterval(() => {
                if (enderAudio.volume < targetVolume) {
                    enderAudio.volume = Math.min(enderAudio.volume + step, targetVolume);
                } else if (enderAudio.volume > targetVolume) {
                    enderAudio.volume = Math.max(enderAudio.volume - step, targetVolume);
                }
                
                if (enderAudio.volume === targetVolume) {
                    clearInterval(enderFadeInterval);
                }
            }, intervalTime);
        }

        // 1. ИНИЦИАЛИЗАЦИЯ (ЗДЕСЬ ИСПРАВЛЕН БАГ С ЭМБИЕНТОМ)
        async function initExperience() {
            document.getElementById('init-screen').style.display = 'none';
            isInitiated = true;
            
            // ХИТРОСТЬ: Запускаем Эмбиент сразу при клике, но с громкостью 0!
            // Браузер разрешит это, так как был клик пользователя.
            enderAudio.volume = 0;
            enderAudio.play().catch(e => console.log("Браузер заблокировал аудио:", e));
            
            // Запуск камеры
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (err) { console.log("Камера отклонена."); }

            // Запуск генеративного гула
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            distortionNode = audioCtx.createWaveShaper();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime); // 55Hz гул
            
            distortionNode.curve = makeDistortionCurve(0);
            distortionNode.oversample = '4x';
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 

            osc.connect(distortionNode);
            distortionNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();

            // Включаем слежку за скроллом только после инициализации
            setTimeout(setupScrollObserver, 500);
        }

        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50, n_samples = 44100, curve = new Float32Array(n_samples);
            for (let i = 0; i < n_samples; ++i ) {
                let x = i * 2 / n_samples - 1;
                curve[i] = ( 3 + k ) * x * 20 * ( Math.PI / 180 ) / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        // 2. ИНТЕРАКТИВ ОТ КУРСОРОВ
        const glitchChars = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ!@#$%^&*()';
        document.addEventListener('mousemove', (e) => {
            if (audioCtx && distortionNode && gainNode.gain.value > 0.01) {
                let speed = Math.abs(e.movementX) + Math.abs(e.movementY);
                distortionNode.curve = makeDistortionCurve(Math.min(speed * 2, 400));
            }
            if (Math.random() > 0.5) {
                let drop = document.createElement('div');
                drop.classList.add('trail-drop');
                drop.innerText = glitchChars[Math.floor(Math.random() * glitchChars.length)];
                drop.style.left = e.clientX + (Math.random() * 20 - 10) + 'px';
                drop.style.top = e.clientY + (Math.random() * 20 - 10) + 'px';
                document.body.appendChild(drop);
                setTimeout(() => drop.remove(), 1500);
            }
        });

        // 3. ОТСЛЕЖИВАНИЕ СКРОЛЛА
        function setupScrollObserver() {
            const merchSection = document.getElementById('merch-section');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Мы в разделе МЕРЧ: гасим гул, поднимаем громкость Эмбиента
                        if (gainNode) gainNode.gain.setTargetAtTime(0.005, audioCtx.currentTime, 1);
                        fadeEnderAudio(0.8, 2000); // Поднимаем громкость до 80%
                    } else {
                        // Ушли наверх: возвращаем гул, гасим Эмбиент в ноль
                        if (gainNode && terminal.style.display !== 'flex') {
                            gainNode.gain.setTargetAtTime(0.05, audioCtx.currentTime, 1);
                        }
                        fadeEnderAudio(0, 2000); // Опускаем громкость в 0
                    }
                });
            }, { threshold: 0.3 }); // Срабатывает, когда видно 30% раздела
            observer.observe(merchSection);
        }

        // Анимации и Глитчи
        const filterNoise = document.getElementById('noise-anim');
        let phase = 0;
        function animateFlesh() { phase += 0.05; filterNoise.setAttribute('baseFrequency', `0.01 ${0.1 + Math.sin(phase) * 0.05}`); requestAnimationFrame(animateFlesh); }
        animateFlesh();

        const textElement = document.getElementById('scramble-text');
        const originalText = textElement.innerText;
        function glitchText() {
            if (Math.random() > 0.9) {
                let currentText = originalText.split('');
                let breaks = Math.floor(Math.random() * 4) + 2; 
                for(let i=0; i<breaks; i++) {
                    let idx = Math.floor(Math.random() * currentText.length);
                    if(currentText[idx] !== ' ') currentText[idx] = glitchChars[Math.floor(Math.random() * glitchChars.length)];
                }
                textElement.innerText = currentText.join('');
            } else textElement.innerText = originalText;
            setTimeout(glitchText, Math.random() * 200 + 50);
        }
        glitchText();

        const rosterItems = document.querySelectorAll('.roster-item');
        const dynamicBg = document.getElementById('dynamic-bg');
        let hoverAudio = new Audio();
        rosterItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                const bgPath = item.getAttribute('data-bg'); if(bgPath) { dynamicBg.style.backgroundImage = `url(${bgPath})`; dynamicBg.style.opacity = 1; }
                const audioPath = item.getAttribute('data-audio'); if(audioPath) { hoverAudio.src = audioPath; hoverAudio.volume = 0.5; hoverAudio.play().catch(e=>{}); }
                document.body.style.filter = "invert(1) hue-rotate(180deg)";
            });
            item.addEventListener('mouseleave', () => {
                dynamicBg.style.opacity = 0; hoverAudio.pause(); hoverAudio.currentTime = 0; document.body.style.filter = "none";
            });
        });

        // --- ТЕРМИНАЛ И ПАРОЛЬ ---
        const terminal = document.getElementById('terminal');
        const termInput = document.getElementById('term-input');
        const termError = document.getElementById('term-error');

        function openTerminal() {
            terminal.style.display = 'flex';
            setTimeout(() => termInput.focus(), 100);
            
            // В терминале гул отключаем, Эмбиент на максимум
            if(gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            fadeEnderAudio(1.0, 1000);
        }

        function closeTerminal() {
            terminal.style.display = 'none';
            termInput.value = '';
            termError.style.opacity = 0;
            
            // Проверяем, где мы находимся при закрытии терминала
            const merchRect = document.getElementById('merch-section').getBoundingClientRect();
            // Если секция мерча НЕ видна на экране:
            if(merchRect.top > window.innerHeight || merchRect.bottom < 0) {
                if(gainNode) gainNode.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.5);
                fadeEnderAudio(0, 1000); // Гасим эмбиент
            } else {
                // Если мы закрыли терминал, но всё еще находимся внизу (на Мерче)
                fadeEnderAudio(0.8, 1000);
            }
        }

        termInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const password = termInput.value.toUpperCase().trim();
                // ТУТ МЕНЯТЬ ПАРОЛЬ
                if (password === 'СИМБИОЗ' || password === 'ENTER') { 
                    termInput.style.color = "#00ff00"; termInput.value = "ДОСТУП РАЗРЕШЕН...";
                    setTimeout(() => { window.location.href = "https://t.me/your_secret_channel"; }, 1500);
                } else {
                    termError.style.opacity = 1; document.body.style.transform = "translate(10px, -10px)";
                    setTimeout(() => document.body.style.transform = "none", 100);
                    termInput.value = '';
                }
            }
        });
    </script>
